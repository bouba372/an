services:
  airflow-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data

  airflow-init:
    build:
      context: ..
      dockerfile: infra/airflow/Dockerfile
    depends_on:
      - airflow-postgres
    env_file:
      - ../.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "False"
    command: >-
      bash -lc "set -e; airflow db migrate; airflow users create
      --username admin
      --password admin
      --firstname Admin
      --lastname User
      --role Admin
      --email admin@example.com || true"

  airflow-webserver:
    build:
      context: ..
      dockerfile: infra/airflow/Dockerfile
    depends_on:
      - airflow-init
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    command: webserver
    volumes:
      - ../dags:/opt/airflow/dags
      - ../flows:/opt/airflow/flows
      - ../lib:/opt/airflow/lib
      - ../dbt_parlemAn:/opt/airflow/dbt_parlemAn

  airflow-scheduler:
    build:
      context: ..
      dockerfile: infra/airflow/Dockerfile
    depends_on:
      - airflow-init
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    command: scheduler
    volumes:
      - ../dags:/opt/airflow/dags
      - ../flows:/opt/airflow/flows
      - ../lib:/opt/airflow/lib
      - ../dbt_parlemAn:/opt/airflow/dbt_parlemAn

  streamlit:
    build:
      context: ..
      dockerfile: infra/streamlit/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      SERVICE_ACCOUNT_INFO: /app/.secrets/parleman-sa.json
      GOOGLE_APPLICATION_CREDENTIALS: /app/.secrets/parleman-sa.json
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    ports:
      - "8501:8501"
    volumes:
      - ../.secrets:/app/.secrets:ro
      - ../streamlit_app.py:/app/streamlit_app.py
      - ../lib:/app/lib

volumes:
  airflow_postgres_data:
