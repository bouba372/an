services:
  metabase-db:
    image: postgres:16-alpine
    container_name: parleman-metabase-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: metabase
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: metabase
    volumes:
      - metabase_db_data:/var/lib/postgresql/data

  metabase:
    image: metabase/metabase:v0.56.3
    container_name: parleman-metabase
    restart: unless-stopped
    depends_on:
      - metabase-db
    ports:
      - "3000:3000"
    env_file:
      - ../config/metabase.env
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: metabase
      MB_DB_HOST: metabase-db
      MB_SITE_URL: http://localhost:3000

volumes:
  metabase_db_data:
