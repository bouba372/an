services:
  airflow-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data

  airflow-init:
    build:
      context: ..
      dockerfile: infra/airflow/Dockerfile
    depends_on:
      - airflow-postgres
    env_file:
      - ../.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "False"
    command: >-
      bash -lc "set -e; airflow db migrate; airflow users create
      --username admin
      --password admin
      --firstname Admin
      --lastname User
      --role Admin
      --email admin@example.com || true"

  airflow-webserver:
    build:
      context: ..
      dockerfile: infra/airflow/Dockerfile
    depends_on:
      - airflow-init
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    command: webserver
    volumes:
      - ../dags:/opt/airflow/dags
      - ../flows:/opt/airflow/flows
      - ../lib:/opt/airflow/lib
      - ../dbt_parlemAn:/opt/airflow/dbt_parlemAn

  airflow-scheduler:
    build:
      context: ..
      dockerfile: infra/airflow/Dockerfile
    depends_on:
      - airflow-init
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    command: scheduler
    volumes:
      - ../dags:/opt/airflow/dags
      - ../flows:/opt/airflow/flows
      - ../lib:/opt/airflow/lib
      - ../dbt_parlemAn:/opt/airflow/dbt_parlemAn

  metabase-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: metabase
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: metabase
    volumes:
      - metabase_db_data:/var/lib/postgresql/data

  metabase:
    image: metabase/metabase:v0.56.3
    restart: unless-stopped
    depends_on:
      - metabase-db
    ports:
      - "3000:3000"
    env_file:
      - ../config/metabase.env
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: metabase
      MB_DB_HOST: metabase-db
      MB_SITE_URL: http://localhost:3000

volumes:
  airflow_postgres_data:
  metabase_db_data:
