name: CI

on:
  push:
    branches:
    - dev
  pull_request:
    branches:
    - dev
  workflow_dispatch:


permissions:
  contents: read

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    - name: Set up Python
      run: uv python install 3.13
    - name: Install dependencies
      run: uv sync --group dev
    - name: Run Ruff
      run: uv run ruff check .

  typecheck:
    name: Type Verification
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    - name: Set up Python
      run: uv python install 3.13
    - name: Install dependencies
      run: uv sync --group dev
    - name: Run Mypy
      run: uv run mypy .

  test:
    name: Testing
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    - name: Set up Python
      run: uv python install 3.13
    - name: Install dependencies
      run: uv sync --group dev
    - name: Run Pytest
      run: uv run pytest tests
